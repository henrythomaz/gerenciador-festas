services:
  nginx:
    image: nginx:alpine
    container_name: nginx-load-balancer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d
      - ../nginx/html:/usr/share/nginx/html
      - ../nginx/logs:/var/log/nginx
    depends_on:
      - app
      - app2
      - app3
    networks:
      - app-network
    restart: unless-stopped

  app:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: servidor-gf-1
    volumes:
      - ../../apps/api:/app/apps/api
    environment:
      - NODE_ENV=development
      - PORT=3000
      - INSTANCE_ID=1
      - REDIS_HOST=redis          # ← ADICIONADO
    command: yarn dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy   # ← ALTERADO
    env_file:
      - ../../.env
    networks:
      - app-network
    restart: unless-stopped

  app2:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: servidor-gf-2
    volumes:
      - ../../apps/api:/app/apps/api
    environment:
      - NODE_ENV=development
      - PORT=3000
      - INSTANCE_ID=2
      - REDIS_HOST=redis          # ← ADICIONADO
    command: yarn dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    networks:
      - app-network
    restart: unless-stopped

  app3:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: servidor-gf-3
    volumes:
      - ../../apps/api:/app/apps/api
    environment:
      - NODE_ENV=development
      - PORT=3000
      - INSTANCE_ID=3
      - REDIS_HOST=redis          # ← ADICIONADO
    command: yarn dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    networks:
      - app-network
    restart: unless-stopped

  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    command: sh -c "until pg_isready -h db -p 5432 -U ${DB_USER}; do sleep 2; done && yarn migrate && yarn seed"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../.env
    networks:
      - app-network

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: servidor-gf-worker
    command: yarn queue
    volumes:
      - ../../apps/api:/app/apps/api
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis          # ← ADICIONADO
    depends_on:
      redis:
        condition: service_healthy   # ← ALTERADO
      db:
        condition: service_healthy
    env_file:
      - ../../.env
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:                       # ← ADICIONADO
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
